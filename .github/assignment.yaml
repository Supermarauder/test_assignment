# assignment.yaml
# Canonical per-assignment config used by:
# 1) scripts/check-expected-files.sh
#
# Location in each assignment repository:
#   .github/assignment.yaml
#
# Notes:
# - Paths and patterns are evaluated relative to the repository root.
# - Missing required items produce ::error annotations and fail the check.
# - Missing optional items produce ::warning annotations only.

expected_files:
    # -------------------------------------------------------------------
    # Explicit required paths (files or directories), relative to repo root
    # -------------------------------------------------------------------
    paths:
        - editme.txt
        - main.py

    # -------------------------------------------------------------------
    # Required glob patterns (supports min counts)
    # - pattern: Bash glob pattern (extglob supported)
    # - min: minimum number of matches required
    # -------------------------------------------------------------------
    globs:
        - pattern: "profile.@(png|jpg|jpeg)"
          min: 1

        - pattern: "task_6.@(png|jpg|jpeg)"
          min: 1

        - pattern: "ascii.@(png|jpg|jpeg)"
          min: 1

    # -------------------------------------------------------------------
    # Optional glob patterns (warning-only checks)
    # - note is included in warning output to clarify expectation
    # -------------------------------------------------------------------
    optional_globs:
        - pattern: "screenshots/*.png"
          note: "Optional additional screenshots for support or context."

# ---------------------------------------------------------------------
# Screenshot Harvester extension section
# - Provides grading metadata for screenshot slots.
# - scripts/check-expected-files.sh ignores unknown top-level keys,
#   so this section is safe to include.
# ---------------------------------------------------------------------
harvester:
    screenshot_slots:
        - path: "profile.png"
          slot_id: "profile"
          points: 2
          description: "Slack profile screenshot was submitted."

        - path: "task_6.png"
          slot_id: "task_6"
          points: 2
          description: "Repository location verification screenshot was submitted."

        - path: "ascii.png"
          slot_id: "ascii"
          points: 2
          description: "ASCII art output screenshot from virtual environment run."
